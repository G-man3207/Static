name: Format

# Checks Prettier formatting only when a new version tag is pushed.
# Tags should point at an already-prepared commit, so this workflow does not
# create follow-up formatting commits after a release tag exists.

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  format:
    if: ${{ github.event.created && !github.event.deleted }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Check Prettier formatting
        run: npm run format:check
