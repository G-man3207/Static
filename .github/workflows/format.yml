name: Format

# Checks Prettier formatting on pull requests and pushes to main for early
# feedback, and again when a new version tag is pushed. Tags should point at
# an already-prepared commit, so this workflow does not create follow-up
# formatting commits after a release tag exists.

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Check Prettier formatting
        run: npm run format:check
