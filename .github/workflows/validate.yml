name: Validate

# Syntactic checks for extension config plus Playwright coverage for MV3 browser
# behavior. Runs only when a new version tag is pushed.

on:
  push:
    tags: ["v*.*.*"]

jobs:
  validate:
    if: ${{ github.event.created && !github.event.deleted }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: manifest.json is valid JSON
        run: jq empty manifest.json

      - name: rules/*.json are valid and well-shaped
        run: |
          set -e
          fail=0
          for f in rules/*.json; do
            name=$(basename "$f")
            if ! jq empty "$f" 2>/dev/null; then
              echo "::error file=$f::not valid JSON"
              fail=1
              continue
            fi
            if [ "$name" = "META.json" ]; then
              if ! jq -e 'type == "object" and has("rulesets")' "$f" >/dev/null; then
                echo "::error file=$f::META.json must be an object with a 'rulesets' key"
                fail=1
              fi
            else
              if ! jq -e 'type == "array"' "$f" >/dev/null; then
                echo "::error file=$f::DNR ruleset must be a top-level JSON array"
                fail=1
                continue
              fi
              missing=$(jq -r '.[] | select((.id | not) or (.priority | not) or (.action | not) or (.condition | not)) | "rule missing required field: \(. | tostring | .[0:80])"' "$f")
              if [ -n "$missing" ]; then
                echo "::error file=$f::$missing"
                fail=1
              fi
              dups=$(jq -r 'map(.id) | group_by(.) | map(select(length > 1) | .[0]) | .[]' "$f")
              if [ -n "$dups" ]; then
                echo "::error file=$f::duplicate rule IDs: $dups"
                fail=1
              fi
            fi
            echo "$f: ok"
          done
          exit $fail

      - name: manifest file references exist
        run: |
          FAIL=0
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            if [ ! -f "$path" ]; then
              echo "::error file=manifest.json::references missing file: $path"
              FAIL=1
            else
              echo "  ok: $path"
            fi
          done < <(jq -r '
            [
              (.content_scripts[]?.js[]?),
              (.background.service_worker),
              (.action.default_popup),
              (.icons // {} | to_entries[].value),
              (.action.default_icon // {} | to_entries[].value),
              (.declarative_net_request.rule_resources[]?.path)
            ]
            | map(select(. != null))
            | unique
            | .[]
          ' manifest.json)
          exit $FAIL

      - name: JavaScript parses
        run: |
          for f in *.js; do
            echo "$f"
            node --check "$f"
          done

      - name: ESLint
        run: npm run lint:strict

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Static Playwright validation
        run: npm run test:static

      - name: Extension browser integration tests
        run: npm run test:e2e:xvfb
